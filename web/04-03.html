<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>색 이름과 코드</title>
<style>
    td,th { border: 1px solid black; padding: 5px;}
    .color-box {display: inline-block; width: 40px; height: 20px;}
</style>

</head>
 
<body>
    <h3>색 이름과 코드 </h3>
    <hr>
    <table border="1">

        <thead>
        <tr><th>이름</th>
        <th>코드</th>
        <th>색</th>
        <th>이름</th>
        <th>코드</th>
        <th>색</th>
    </tr></thead> 

    <tbody>
    <tr>
         <td>Brown</td>
         <td>#A52A2A</td>
         <td><span class="color-box" style="background:#A52A2A ;"></span></td>

         <td>DeepSkyblue</td>
         <td>#00BFFF</td>
         <td><span class="color-box" style="background: #00BFFF;"></span></td>
    </tr>

    <tr>
         <td>blueviolet</td>
         <td>#8A2BE2</td>
         <td><span class="color-box" style="background:#8A2BE2 ;"></span></td>

         <td>Gold</td>
         <td>#FFD700</td>
         <td><span class="color-box" style="background:#FFD700 ;"></span></td>
    </tr>

    <tr>
         <td>DarkOrange</td>
         <td>#FF8C00</td>
         <td><span class="color-box" style="background:#FF8C00 ;"></span></td>

         <td>OliveDrab</td>
         <td>#6B8E23</td>
         <td><span class="color-box" style="background:#6B8E23 ;"></span></td>
    </tr>
    </tbody>
</table>
</body>
</html>
