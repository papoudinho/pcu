<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>transform:rotate()</title>
<script>
    let n = 2;
     function change(obj) {
        obj.style.transform = "scale(" + n + ",1)";
        n = n*2;
     }
// 여기에 코드를 작성하세요.
</script>
</head>
<body>
<h3>클릭하면 2,3,4배로 옆으로 늘어납니다.</h3>
<hr>
<div>
<img src="img/spongebob.png" 
	width="100" height="100" alt="animation"
	onclick="change(this)">
</div>
</body>
</html>
